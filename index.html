<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Kana Battle — ranked</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Noto+Serif+JP:wght@500;700;900&family=Noto+Sans+JP:wght@500;700;900&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#070912;
    --bg-1:#0d1124;
    --bg-2:#141a35;
    --bg-3:#1d2447;
    --line:rgba(255,255,255,0.08);
    --line-strong:rgba(255,255,255,0.16);
    --ink:#ECE9DD;
    --ink-dim:#9ba1bd;
    --ink-faint:#5a607d;
    --paper:#F4EDD9;
    --paper-shadow:#d4ccb6;
    --p1:#FF3D5E;          /* you */
    --p1-soft:#FF6C85;
    --p1-glow:rgba(255,61,94,0.45);
    --p2:#3FB6FF;          /* opponent */
    --p2-soft:#7AD0FF;
    --p2-glow:rgba(63,182,255,0.45);
    --gold:#FFC83A;
    --green:#3DDC97;
    --red:#FF4D5E;
    --shadow-strong:0 30px 60px -20px rgba(0,0,0,0.6), 0 12px 24px -12px rgba(0,0,0,0.5);
    --display: "Russo One", "Helvetica Neue", sans-serif;
    --jp: "Noto Serif JP", "Hiragino Mincho ProN", serif;
    --jp-sans: "Noto Sans JP", sans-serif;
    --ui: "IBM Plex Sans", "Helvetica Neue", sans-serif;
    --mono: "IBM Plex Mono", "JetBrains Mono", monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body,#root{height:100%; min-height:100%;}
  body{
    font-family: var(--ui);
    background: var(--bg-0);
    color: var(--ink);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  input{font-family:inherit; color:inherit;}

  /* ============= Screen scaffolding ============= */
  .screen{
    position:relative;
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background: radial-gradient(1200px 600px at 20% 0%, rgba(255,61,94,0.10), transparent 60%),
                radial-gradient(1200px 600px at 80% 100%, rgba(63,182,255,0.10), transparent 60%),
                linear-gradient(180deg, var(--bg-0), var(--bg-1));
  }
  .screen::before{
    content:""; position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    pointer-events:none;
  }

  /* ============= Ruleset Vote ============= */
  .rs-vote{align-items:center; justify-content:center; padding:48px 24px;}
  .rs-wrap{
    position:relative; z-index:1;
    width:100%; max-width:1100px;
    display:flex; flex-direction:column; gap:28px; align-items:center;
  }
  .rs-header{text-align:center; display:flex; flex-direction:column; gap:8px;}
  .rs-eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:0.25em; color:var(--gold);}
  .rs-title{font-family:var(--display); font-size:44px; letter-spacing:0.08em;}
  .rs-sub{font-family:var(--mono); font-size:12px; color:var(--ink-dim); letter-spacing:0.08em;}

  .rs-options{
    width:100%;
    display:grid; grid-template-columns: repeat(4, 1fr); gap:16px;
  }
  .rs-card{
    position:relative; text-align:left;
    background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.2));
    border:1px solid var(--line-strong);
    border-radius:16px;
    padding:22px;
    display:flex; flex-direction:column; gap:10px;
    transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    overflow:hidden;
    color:inherit;
  }
  .rs-card:not(:disabled):hover{transform:translateY(-4px); border-color:var(--p1); box-shadow:0 16px 32px -10px var(--p1-glow);}
  .rs-card.picked{border-color:var(--p1); box-shadow:0 16px 32px -10px var(--p1-glow);}
  .rs-card.picked::after{
    content:"VOTED"; position:absolute; top:14px; right:14px;
    font-family:var(--mono); font-size:10px; letter-spacing:0.2em;
    background:var(--p1); color:#fff;
    padding:3px 8px; border-radius:99px;
  }
  .rs-card.dim{opacity:0.35;}
  .rs-card.large{padding:32px; gap:14px; min-width:280px;}
  .rs-card.pulse{animation: rsPulse 1.2s ease-in-out infinite; border-color:var(--green); box-shadow: 0 0 40px rgba(61,220,151,0.4);}
  @keyframes rsPulse{0%,100%{transform:scale(1);} 50%{transform:scale(1.02);}}
  .rs-glyph{
    font-family:var(--jp); font-weight:900; font-size:56px; line-height:1;
    color:var(--gold);
    text-shadow: 0 0 24px rgba(255,200,58,0.3);
  }
  .rs-card.large .rs-glyph{font-size:88px;}
  .rs-name{font-family:var(--display); font-size:20px; letter-spacing:0.06em;}
  .rs-card.large .rs-name{font-size:28px;}
  .rs-meta{display:flex; align-items:center; gap:10px;}
  .rs-count{font-family:var(--mono); font-size:11px; color:var(--ink-dim);}
  .rs-fam{
    font-family:var(--mono); font-size:10px; letter-spacing:0.15em; text-transform:uppercase;
    padding:2px 6px; border-radius:4px;
    background:rgba(255,255,255,0.06);
  }
  .fam-row{color:var(--green); border:1px solid rgba(61,220,151,0.3);}
  .fam-bundle{color:var(--p2); border:1px solid rgba(63,182,255,0.3);}
  .fam-full{color:var(--gold); border:1px solid rgba(255,200,58,0.3);}
  .fam-mixed{color:#c9b6ff; border:1px solid rgba(167,139,250,0.4);}
  .rs-preview{display:flex; flex-wrap:wrap; gap:4px;}
  .rs-prev-char{
    display:inline-grid; place-items:center;
    width:26px; height:26px; border-radius:6px;
    background:var(--paper); color:#1a1d2e;
    font-family:var(--jp); font-weight:700; font-size:16px;
  }
  .rs-prev-more{
    display:inline-grid; place-items:center;
    height:26px; padding:0 8px; border-radius:6px;
    background:rgba(255,255,255,0.06);
    font-family:var(--mono); font-size:11px; color:var(--ink-dim);
  }

  .rs-status{display:flex; justify-content:center; gap:18px; flex-wrap:wrap;}
  .rs-status-pill{
    display:flex; align-items:center; gap:8px;
    padding:8px 14px; border-radius:99px;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--line);
    font-family:var(--mono); font-size:12px; color:var(--ink-dim);
  }
  .rs-status-pill .dot{width:8px; height:8px; border-radius:50%; background:var(--ink-faint); animation: livepulse 1.2s ease-in-out infinite;}
  .rs-status-pill.done{color:var(--green); border-color:var(--green);}
  .rs-status-pill.done .dot{background:var(--green); animation:none;}

  /* tiebreak */
  .rs-tiebreak-title{
    font-family:var(--display); font-size:36px; letter-spacing:0.18em;
    background:linear-gradient(180deg, var(--gold), #a87a14);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation: shake 0.4s ease-in-out infinite;
  }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-3px);}
    75%{transform:translateX(3px);}
  }
  .rs-tiebreak-sub{font-family:var(--mono); font-size:12px; color:var(--ink-dim); letter-spacing:0.1em; text-align:center;}
  .rs-tiebreak-row{
    display:grid; grid-template-columns: 1fr auto 1fr; align-items:center; gap:32px;
    width:100%;
  }
  .rs-tb-side{
    display:flex; flex-direction:column; align-items:center; gap:10px;
    transition: filter 0.1s, transform 0.1s;
    filter: grayscale(0.6) brightness(0.7);
  }
  .rs-tb-side.lit{ filter:none; transform:scale(1.02);}
  .rs-tb-side.lit.me .rs-card{border-color:var(--p1); box-shadow:0 0 32px var(--p1-glow);}
  .rs-tb-side.lit.opp .rs-card{border-color:var(--p2); box-shadow:0 0 32px var(--p2-glow);}
  .rs-tb-who{font-family:var(--mono); font-size:11px; letter-spacing:0.2em; color:var(--ink-dim);}
  .rs-tb-spinner{
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .rs-tb-current{
    width:140px; height:140px; border-radius:18px;
    background:linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border:2px solid var(--gold);
    box-shadow: 0 0 32px rgba(255,200,58,0.4);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    padding:12px;
  }
  .rs-tb-spinner.settled .rs-tb-current{
    border-color:var(--green);
    box-shadow: 0 0 40px rgba(61,220,151,0.5);
    animation: tbSettle 0.6s cubic-bezier(0.2, 0.9, 0.3, 1.4);
  }
  @keyframes tbSettle{
    0%{transform:scale(1);}
    40%{transform:scale(1.2); }
    100%{transform:scale(1);}
  }
  .rs-tb-glyph{font-family:var(--jp); font-weight:900; font-size:54px; color:var(--gold); line-height:1;}
  .rs-tb-spinner.settled .rs-tb-glyph{color:var(--green);}
  .rs-tb-name{font-family:var(--display); font-size:13px; letter-spacing:0.08em; text-align:center;}
  .rs-tb-confirm{
    font-family:var(--display); font-size:14px; letter-spacing:0.2em; color:var(--green);
    animation: lockedIn 0.4s ease-out;
  }
  @keyframes lockedIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  .rs-locked{display:flex; flex-direction:column; align-items:center; gap:18px;}
  .rs-locked-label{font-family:var(--display); font-size:18px; letter-spacing:0.25em; color:var(--green);}
  .rs-locked-sub{font-family:var(--mono); font-size:12px; color:var(--ink-faint); letter-spacing:0.1em;}

  /* ============= Splash ============= */
  .splash{ align-items:center; justify-content:center; padding:48px 24px;}
  .splash-bg{
    position:absolute; inset:0;
    background:
      radial-gradient(800px 400px at 30% 30%, rgba(255,61,94,0.18), transparent 60%),
      radial-gradient(800px 400px at 70% 70%, rgba(63,182,255,0.18), transparent 60%);
    pointer-events:none;
  }
  .splash-content{
    position:relative; z-index:1;
    width:100%; max-width:1100px;
    display:flex; flex-direction:column; gap:32px;
  }
  .splash-brand{display:flex; align-items:center; gap:24px;}
  .brand-mark{
    width:88px; height:88px; border-radius:18px;
    background:linear-gradient(135deg, var(--p1), #c41e3c);
    display:grid; place-items:center;
    font-family:var(--jp); font-weight:900; font-size:54px; color:#fff;
    box-shadow: 0 16px 40px -10px var(--p1-glow), inset 0 -6px 0 rgba(0,0,0,0.2);
  }
  .brand-title{font-family:var(--display); font-size:54px; letter-spacing:0.04em; line-height:1;}
  .brand-sub{font-family:var(--jp-sans); font-size:14px; color:var(--ink-dim); margin-top:6px; letter-spacing:0.08em;}

  .splash-card{
    background:linear-gradient(180deg, rgba(29,36,71,0.7), rgba(13,17,36,0.7));
    border:1px solid var(--line-strong);
    border-radius:22px;
    padding:32px;
    backdrop-filter: blur(12px);
    display:grid; grid-template-columns: 1fr 1fr; gap:24px; align-items:center;
  }
  .splash-profile{display:flex; align-items:center; gap:20px;}
  .profile-avatar{
    width:72px; height:72px; border-radius:16px;
    background: linear-gradient(135deg, #29304d, #1a1f3a);
    border:1px solid var(--line-strong);
    display:grid; place-items:center;
    font-family:var(--jp); font-weight:900; font-size:38px;
    color:var(--p1);
  }
  .profile-name{font-family:var(--display); font-size:28px; letter-spacing:0.04em;}
  .profile-stats{
    grid-column:1/-1;
    display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;
    padding-top:8px;
    border-top:1px dashed var(--line);
    padding-top:20px;
  }
  .stat-block{display:flex; flex-direction:column; gap:4px;}
  .stat-label{font-family:var(--mono); font-size:11px; letter-spacing:0.15em; color:var(--ink-faint);}
  .stat-value{font-family:var(--display); font-size:32px; letter-spacing:0.02em;}
  .stat-value.pos{color:var(--green);}
  .stat-value.neg{color:var(--red);}

  .btn-primary{
    position:relative;
    display:inline-flex; align-items:center; justify-content:center; gap:12px;
    width:100%;
    padding:18px 28px;
    font-family:var(--display); font-size:22px; letter-spacing:0.14em;
    background:linear-gradient(180deg, var(--p1), #c41e3c);
    color:#fff; border-radius:14px;
    box-shadow: 0 14px 32px -8px var(--p1-glow), inset 0 -4px 0 rgba(0,0,0,0.25);
    transition:transform 0.1s ease, box-shadow 0.2s ease;
    overflow:hidden;
  }
  .btn-primary:hover{transform:translateY(-2px); box-shadow: 0 20px 40px -8px var(--p1-glow), inset 0 -4px 0 rgba(0,0,0,0.25);}
  .btn-primary:active{transform:translateY(1px);}
  .btn-pulse{
    position:absolute; inset:0;
    background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.3), transparent 60%);
    animation: shine 2.4s linear infinite;
  }
  @keyframes shine{ 0%{transform:translateX(-100%);} 100%{transform:translateX(100%);} }
  .btn-sub{text-align:center; margin-top:8px; font-family:var(--mono); font-size:11px; color:var(--ink-faint); letter-spacing:0.1em;}

  .rank-badge{display:inline-flex; flex-direction:column; gap:2px;}
  .rank-tier{font-family:var(--mono); font-size:10px; letter-spacing:0.2em; color:var(--gold); text-transform:uppercase;}
  .rank-elo{display:flex; align-items:baseline; gap:8px;}
  .rank-num{font-family:var(--display); font-size:22px; letter-spacing:0.04em;}
  .rank-delta{font-family:var(--mono); font-size:12px; padding:2px 6px; border-radius:4px;}
  .rank-delta.pos{background:rgba(61,220,151,0.15); color:var(--green);}
  .rank-delta.neg{background:rgba(255,77,94,0.15); color:var(--red);}

  /* practice cards */
  .practice-row{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
  .practice-card{
    background:rgba(13,17,36,0.6);
    border:1px solid var(--line);
    border-radius:18px;
    padding:20px;
    backdrop-filter: blur(8px);
  }
  .practice-card.best{ border-top:3px solid var(--green);}
  .practice-card.worst{ border-top:3px solid var(--red);}
  .practice-title{font-family:var(--mono); font-size:11px; letter-spacing:0.2em; color:var(--ink-faint); margin-bottom:14px;}
  .practice-card.best .practice-title{color:var(--green);}
  .practice-card.worst .practice-title{color:var(--red);}
  .practice-empty{font-family:var(--mono); font-size:12px; color:var(--ink-faint); padding:24px 0; text-align:center;}
  .practice-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(72px, 1fr)); gap:10px;}
  .practice-cell{
    background:rgba(255,255,255,0.04);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 8px;
    text-align:center;
  }
  .practice-char{font-family:var(--jp); font-weight:900; font-size:28px; line-height:1; color:var(--paper);}
  .practice-meta{display:flex; flex-direction:column; gap:2px; margin-top:6px;}
  .practice-romaji{font-family:var(--mono); font-size:11px; color:var(--ink-dim);}
  .practice-acc{font-family:var(--mono); font-size:10px; color:var(--ink-faint);}

  /* ============= Lobby ============= */
  .lobby{align-items:center; justify-content:center;}
  .lobby-stack{display:flex; flex-direction:column; align-items:center; gap:24px;}
  .lobby-status{font-family:var(--display); font-size:22px; letter-spacing:0.2em; color:var(--ink);}
  .lobby-spinner{position:relative; width:80px; height:80px;}
  .lobby-time{position:absolute; inset:0; display:grid; place-items:center; font-family:var(--mono); font-size:14px; color:var(--ink-dim);}
  .lobby-meta{font-family:var(--ui); font-size:14px; color:var(--ink-dim); text-align:center; display:flex; flex-direction:column; gap:6px;}
  .lobby-meta b{color:var(--ink); font-family:var(--mono);}
  .lobby-tip{font-family:var(--mono); font-size:11px; letter-spacing:0.1em; color:var(--ink-faint);}
  .lobby-dots{display:flex; gap:8px;}
  .lobby-dots span{width:8px; height:8px; border-radius:50%; background:var(--p1); animation: lobbypulse 1.2s ease-in-out infinite;}
  .lobby-dots span:nth-child(2){animation-delay:0.2s;}
  .lobby-dots span:nth-child(3){animation-delay:0.4s;}
  @keyframes lobbypulse{0%,100%{opacity:0.3; transform:scale(0.8);} 50%{opacity:1; transform:scale(1.2);}}

  /* ============= VS Screen ============= */
  .vs{align-items:center; justify-content:center; overflow:hidden;}
  .vs-stage{
    display:grid; grid-template-columns:1fr auto 1fr; gap:48px;
    align-items:center; max-width:1100px; width:100%; padding:0 48px;
  }
  .vs-side{display:flex; flex-direction:column; align-items:center; gap:14px;}
  .vs-side.left{animation: slideInL 0.6s cubic-bezier(0.2,0.9,0.3,1.1);}
  .vs-side.right{animation: slideInR 0.6s cubic-bezier(0.2,0.9,0.3,1.1);}
  @keyframes slideInL{from{transform:translateX(-200px); opacity:0;} to{transform:translateX(0); opacity:1;}}
  @keyframes slideInR{from{transform:translateX(200px); opacity:0;} to{transform:translateX(0); opacity:1;}}
  .vs-avatar{
    width:160px; height:160px; border-radius:24px;
    display:grid; place-items:center;
    font-family:var(--jp); font-weight:900; font-size:96px; color:#fff;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
  }
  .vs-avatar.p1{ background:linear-gradient(135deg, var(--p1), #c41e3c); box-shadow: 0 30px 60px -20px var(--p1-glow);}
  .vs-avatar.p2{ background:linear-gradient(135deg, var(--p2), #1a7cb8); box-shadow: 0 30px 60px -20px var(--p2-glow);}
  .vs-name{font-family:var(--display); font-size:28px; letter-spacing:0.06em;}
  .vs-mid{display:flex; flex-direction:column; align-items:center; gap:10px;}
  .vs-vs{
    font-family:var(--display); font-size:88px; line-height:1;
    background:linear-gradient(180deg, #fff, #b8bcd0);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow: 0 0 40px rgba(255,255,255,0.2);
    animation: pop 0.4s 0.4s both;
  }
  @keyframes pop{from{transform:scale(2); opacity:0;} to{transform:scale(1); opacity:1;}}
  .vs-round{font-family:var(--mono); font-size:11px; letter-spacing:0.2em; color:var(--ink-dim);}

  /* ============= Battle ============= */
  .battle{
    display:grid;
    grid-template-rows: auto auto 1fr auto auto;
    gap:14px;
    padding:18px 22px 18px 22px;
    height:100vh; min-height:720px;
  }

  /* HUDs */
  .opp-hud, .me-hud{
    display:grid; grid-template-columns: 280px 1fr 140px; gap:20px; align-items:center;
    padding:14px 18px; border-radius:14px;
    background:linear-gradient(90deg, rgba(63,182,255,0.08), rgba(63,182,255,0.02));
    border:1px solid rgba(63,182,255,0.15);
  }
  .me-hud{
    background:linear-gradient(90deg, rgba(255,61,94,0.08), rgba(255,61,94,0.02));
    border:1px solid rgba(255,61,94,0.2);
  }
  .opp-id, .me-id{display:flex; align-items:center; gap:14px;}
  .opp-avatar, .me-avatar{
    width:54px; height:54px; border-radius:12px;
    display:grid; place-items:center;
    font-family:var(--jp); font-weight:900; font-size:30px;
    background:rgba(13,17,36,0.7);
    border:1px solid var(--line-strong);
  }
  .opp-avatar{color:var(--p2);}
  .me-avatar{color:var(--p1);}
  .opp-name, .me-name{font-family:var(--display); font-size:18px; letter-spacing:0.06em;}
  .opp-meta, .me-meta{display:flex; flex-direction:column; gap:2px;}
  .opp-mid, .me-mid{display:flex; flex-direction:column; gap:8px;}
  .opp-extras, .me-extras{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .opp-status{display:flex; align-items:center; gap:8px; justify-content:flex-end; font-family:var(--mono); font-size:11px; color:var(--ink-dim);}
  .live-dot{width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation: livepulse 1.6s ease-in-out infinite;}
  .live-dot.frozen{background:var(--p2); box-shadow:0 0 8px var(--p2);}
  @keyframes livepulse{0%,100%{opacity:0.5;} 50%{opacity:1;}}

  /* HP bar */
  .hpbar{display:flex; flex-direction:column; gap:4px;}
  .hpbar-track{
    position:relative; width:100%; height:18px;
    background:rgba(0,0,0,0.5); border-radius:4px;
    border:1px solid var(--line-strong);
    overflow:hidden;
  }
  .hpbar-fill{
    position:absolute; left:0; top:0; bottom:0;
    transition: width 0.5s cubic-bezier(0.2,0.8,0.2,1);
    box-shadow: inset 0 -2px 0 rgba(0,0,0,0.3), 0 0 12px var(--p1-glow);
  }
  .hpbar.opp .hpbar-fill{ box-shadow: inset 0 -2px 0 rgba(0,0,0,0.3), 0 0 12px var(--p2-glow);}
  .hpbar.low .hpbar-fill{ animation: hpFlash 0.8s ease-in-out infinite;}
  @keyframes hpFlash{0%,100%{filter:brightness(1);} 50%{filter:brightness(1.4);}}
  .hpbar-segments{position:absolute; inset:0; display:flex; pointer-events:none;}
  .hpbar-segments span{flex:1; border-right:1px solid rgba(0,0,0,0.35);}
  .hpbar-segments span:last-child{border-right:none;}
  .hpbar-label{display:flex; justify-content:space-between; font-family:var(--mono); font-size:11px; letter-spacing:0.1em; color:var(--ink-dim);}
  .hpbar-value{color:var(--ink);}

  /* deck pill */
  .deck-pill{
    display:inline-flex; align-items:center; gap:8px;
    padding:6px 12px; border-radius:8px;
    background:rgba(0,0,0,0.35);
    border:1px solid var(--line-strong);
    font-family:var(--mono); font-size:13px;
  }
  .deck-pill-glyph{font-family:var(--jp); font-weight:900; color:var(--p2);}
  .deck-pill-n{font-family:var(--display); font-size:18px;}
  .deck-pill-label{font-size:11px; color:var(--ink-dim); letter-spacing:0.1em;}
  .me-counter{
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 10px; border-radius:8px;
    background:rgba(0,0,0,0.3);
    border:1px solid var(--line);
    font-family:var(--mono); font-size:13px;
  }
  .me-counter.pos{color:var(--green);}
  .me-counter.neg{color:var(--red);}

  .opp-pups{display:flex; gap:6px;}
  .opp-pup{
    width:30px; height:30px; border-radius:8px;
    display:grid; place-items:center;
    font-family:var(--jp); font-size:18px; font-weight:900;
    background:rgba(0,0,0,0.4);
    border:1px solid var(--c, var(--line-strong));
    color:var(--c, var(--ink));
    box-shadow: 0 0 12px var(--c, transparent);
  }
  .opp-pup-empty{font-family:var(--mono); font-size:11px; color:var(--ink-faint); letter-spacing:0.1em;}

  /* buff strip */
  .buff-strip{display:flex; gap:6px;}
  .buff-strip.empty{display:none;}
  .buff-chip{
    display:inline-flex; align-items:center; gap:4px;
    padding:4px 8px; border-radius:6px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--c);
    color:var(--c);
    font-family:var(--jp); font-weight:900; font-size:14px;
    box-shadow: 0 0 16px color-mix(in srgb, var(--c) 30%, transparent);
  }
  .buff-n{font-family:var(--mono); font-size:10px;}

  /* mod banner */
  .mod-banner{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:10px 18px;
    background:linear-gradient(90deg, rgba(255,200,58,0.10), transparent);
    border:1px solid rgba(255,200,58,0.25);
    border-left:3px solid var(--gold);
    border-radius:8px;
    font-family:var(--mono); font-size:13px;
  }
  .mod-banner-label{font-family:var(--display); letter-spacing:0.1em; color:var(--gold);}
  .mod-banner-chip{display:inline-flex; align-items:center; gap:6px;}
  .mod-banner-chip.ruleset{
    padding:4px 10px; border-radius:6px;
    background:rgba(63,182,255,0.12);
    border:1px solid rgba(63,182,255,0.4);
    color:var(--p2-soft);
  }
  .mod-banner-chip.ruleset .mod-banner-glyph{color:var(--p2);}
  .mod-banner-meta{font-family:var(--mono); font-size:10px; color:var(--ink-dim); letter-spacing:0.08em;}
  .mod-banner-glyph{font-family:var(--jp); font-weight:900; font-size:18px; color:var(--gold);}

  /* battle stage */
  .battle-stage{
    display:grid; grid-template-columns: 240px 1fr 240px; gap:24px;
    min-height:0;
  }
  .battle-log, .powerup-rail{
    background:rgba(13,17,36,0.5);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px;
    display:flex; flex-direction:column; gap:12px;
    overflow:hidden;
  }
  .rail-title{font-family:var(--mono); font-size:11px; letter-spacing:0.2em; color:var(--ink-faint);}
  .log-list{display:flex; flex-direction:column; gap:6px; overflow:hidden;}
  .log-entry{
    font-family:var(--mono); font-size:12px;
    padding:6px 10px; border-radius:6px;
    background:rgba(255,255,255,0.02);
    border-left:2px solid var(--line-strong);
    color:var(--ink-dim);
    animation: logIn 0.4s ease-out;
  }
  @keyframes logIn{from{transform:translateX(-8px); opacity:0;} to{transform:translateX(0); opacity:1;}}
  .log-entry.round{border-left-color:var(--gold); color:var(--gold);}
  .log-entry.send{border-left-color:var(--p1); color:var(--p1-soft);}
  .log-entry.block{border-left-color:var(--gold); color:#FFE08A;}
  .log-entry.reflect{border-left-color:var(--green); color:var(--green);}
  .log-entry.skip{border-left-color:var(--red); color:#ffa5b0;}
  .log-entry.drop{border-left-color:var(--p2); color:var(--p2-soft);}
  .log-entry.powerup{border-left-color:#A78BFA; color:#c9b6ff;}

  /* card stack */
  .card-stack{
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    position:relative; min-height:0;
  }
  .deck-shadow{position:relative; width:320px; height:380px;}
  .card{
    position:absolute; inset:0;
    background:var(--paper);
    border-radius:14px;
    box-shadow: 0 18px 36px -12px rgba(0,0,0,0.5), inset 0 -3px 0 var(--paper-shadow);
  }
  .card.behind{
    background:#E5DDC8;
    box-shadow: 0 10px 20px -8px rgba(0,0,0,0.4);
  }
  .card-inner{
    position:absolute; inset:14px;
    border:2px dashed rgba(0,0,0,0.1);
    border-radius:10px;
    display:grid; place-items:center;
  }
  .card-corner{
    position:absolute;
    font-family:var(--mono); font-size:11px; letter-spacing:0.15em;
    color:rgba(0,0,0,0.35);
  }
  .card-corner.tl{top:14px; left:18px;}
  .card-corner.br{top:14px; right:18px; font-family:var(--display); font-size:18px; color:rgba(0,0,0,0.45);}
  .card-char{
    font-family:var(--jp); font-weight:900; font-size:200px;
    color:#1a1d2e; line-height:1;
    text-shadow: 0 4px 0 rgba(0,0,0,0.06);
  }
  .card-char.dim{color:rgba(0,0,0,0.25);}
  .card-peek{
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    font-family:var(--mono); font-size:24px; color:var(--p1);
    padding:4px 12px; border-radius:6px;
    background:rgba(255,61,94,0.1);
    border:1px solid var(--p1);
    animation: peekFade 1s ease-in-out infinite;
  }
  @keyframes peekFade{0%,100%{opacity:0.6;} 50%{opacity:1;}}

  .flash-correct, .flash-wrong{
    position:absolute; top:-28px; left:50%; transform:translateX(-50%);
    font-family:var(--display); font-size:22px; letter-spacing:0.1em;
    padding:6px 14px; border-radius:8px;
    animation: flashPop 0.9s ease-out forwards;
    pointer-events:none;
  }
  .flash-correct{background:var(--green); color:#062618;}
  .flash-wrong{background:var(--red); color:#fff; font-family:var(--mono);}
  @keyframes flashPop{
    0%{transform:translateX(-50%) translateY(10px); opacity:0;}
    15%{transform:translateX(-50%) translateY(0); opacity:1;}
    75%{transform:translateX(-50%) translateY(0); opacity:1;}
    100%{transform:translateX(-50%) translateY(-8px); opacity:0;}
  }

  .deck-counter{
    display:flex; align-items:center; gap:14px;
    padding:10px 18px;
    background:rgba(0,0,0,0.4);
    border:1px solid var(--p1);
    border-radius:10px;
    box-shadow: 0 0 24px var(--p1-glow);
  }
  .deck-counter-label{font-family:var(--mono); font-size:11px; letter-spacing:0.2em; color:var(--ink-dim);}
  .deck-counter-n{font-family:var(--display); font-size:32px; color:var(--p1); line-height:1;}

  /* power-up rail */
  .pup-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .pup{
    position:relative;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    padding:14px 8px; border-radius:10px;
    background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.2));
    border:1px solid var(--pup-color, var(--line));
    color:var(--pup-color, var(--ink));
    transition: transform 0.1s ease, box-shadow 0.2s ease;
    min-height:80px;
  }
  .pup:not(.empty):hover{
    transform:translateY(-2px);
    box-shadow: 0 0 24px var(--pup-color, transparent);
  }
  .pup.empty{
    background:rgba(255,255,255,0.02);
    border:1px dashed var(--line);
    cursor:default;
  }
  .pup-glyph{font-family:var(--jp); font-weight:900; font-size:32px; line-height:1;}
  .pup-name{font-family:var(--mono); font-size:11px; letter-spacing:0.1em; color:var(--ink);}
  .rail-help{font-family:var(--mono); font-size:10px; color:var(--ink-faint); letter-spacing:0.1em; line-height:1.5;}

  /* input bar */
  .input-bar{
    display:grid; grid-template-columns: 200px 1fr; gap:14px;
  }
  .dunno{
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    padding:14px;
    background:linear-gradient(180deg, rgba(255,200,58,0.15), rgba(255,200,58,0.05));
    border:1px solid rgba(255,200,58,0.4);
    border-radius:12px;
    transition: transform 0.1s ease;
  }
  .dunno:hover{transform:translateY(-2px); border-color:var(--gold);}
  .dunno:disabled{opacity:0.4; cursor:not-allowed;}
  .dunno-glyph{font-family:var(--jp); font-weight:900; font-size:26px; color:var(--gold); line-height:1;}
  .dunno-label{font-family:var(--display); font-size:14px; letter-spacing:0.08em;}
  .dunno-sub{font-family:var(--mono); font-size:10px; color:var(--ink-dim); letter-spacing:0.1em;}

  .answer-wrap{
    position:relative;
    display:flex; align-items:center;
    background:linear-gradient(180deg, rgba(13,17,36,0.8), rgba(13,17,36,0.6));
    border:1px solid var(--line-strong);
    border-radius:12px;
    overflow:hidden;
  }
  .input-bar.frozen .answer-wrap{border-color:var(--p2); box-shadow: 0 0 24px var(--p2-glow);}
  .answer-input{
    flex:1;
    padding:18px 20px;
    background:transparent;
    border:none; outline:none;
    font-family:var(--mono); font-size:28px; letter-spacing:0.08em;
    color:var(--ink);
  }
  .answer-input::placeholder{color:var(--ink-faint);}
  .answer-submit{
    padding:0 24px; height:100%;
    background:linear-gradient(180deg, var(--p1), #c41e3c);
    color:#fff;
    font-family:var(--display); font-size:16px; letter-spacing:0.1em;
    transition: filter 0.1s ease;
  }
  .answer-submit:disabled{filter:grayscale(1) brightness(0.6); cursor:not-allowed;}
  .answer-submit:not(:disabled):hover{filter:brightness(1.1);}
  .frozen-overlay{
    position:absolute; inset:0;
    display:grid; place-items:center;
    background:rgba(63,182,255,0.15);
    backdrop-filter: blur(4px);
    font-family:var(--display); font-size:22px; letter-spacing:0.2em; color:var(--p2);
    pointer-events:none;
  }

  /* ============= Overlays ============= */
  .overlay{
    position:fixed; inset:0;
    background:rgba(7,9,18,0.7); backdrop-filter: blur(8px);
    display:grid; place-items:center;
    z-index:10;
    animation: overlayIn 0.3s ease-out;
  }
  @keyframes overlayIn{from{opacity:0;} to{opacity:1;}}

  .round-end-card{
    padding:48px 64px; border-radius:24px;
    background:linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border:1px solid var(--line-strong);
    text-align:center;
    box-shadow: var(--shadow-strong);
  }
  .round-end-card.win{border-top:3px solid var(--green);}
  .round-end-card.lose{border-top:3px solid var(--red);}
  .round-end-label{font-family:var(--mono); font-size:12px; letter-spacing:0.3em; color:var(--ink-dim);}
  .round-end-result{font-family:var(--display); font-size:56px; letter-spacing:0.08em; margin:12px 0 8px;}
  .round-end-card.win .round-end-result{color:var(--green);}
  .round-end-card.lose .round-end-result{color:var(--red);}
  .round-end-sub{font-family:var(--mono); font-size:12px; color:var(--ink-faint); letter-spacing:0.1em;}

  /* modifier picker */
  .mod-pick-card{
    width:min(96vw, 980px);
    background:linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border:1px solid var(--line-strong);
    border-radius:24px;
    padding:36px;
    box-shadow: var(--shadow-strong);
  }
  .mod-pick-title{font-family:var(--display); font-size:28px; letter-spacing:0.1em; text-align:center;}
  .mod-pick-sub{font-family:var(--mono); font-size:12px; letter-spacing:0.1em; color:var(--ink-dim); text-align:center; margin-top:8px;}
  .mod-options{display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; margin:28px 0;}
  .mod-option{
    position:relative;
    text-align:left;
    background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.2));
    border:1px solid var(--line-strong);
    border-radius:14px;
    padding:20px;
    display:flex; flex-direction:column; gap:8px;
    transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    overflow:hidden;
  }
  .mod-option:not(:disabled):hover{transform:translateY(-4px); border-color:var(--gold); box-shadow:0 16px 32px -10px rgba(255,200,58,0.3);}
  .mod-option.picked{border-color:var(--p1); box-shadow:0 16px 32px -10px var(--p1-glow);}
  .mod-option.unpicked{opacity:0.4;}
  .mod-option-glyph{font-family:var(--jp); font-weight:900; font-size:48px; color:var(--gold); line-height:1;}
  .mod-option-name{font-family:var(--display); font-size:18px; letter-spacing:0.06em;}
  .mod-option-desc{font-family:var(--ui); font-size:13px; color:var(--ink-dim); line-height:1.5;}
  .mod-option-tone{position:absolute; right:0; top:0; bottom:0; width:4px;}
  .tone-calm{background:var(--green);}
  .tone-sharp{background:var(--gold);}
  .tone-wild{background:#A78BFA;}
  .tone-aggressive{background:var(--p1);}
  .tone-dark{background:#7a3aff;}
  .mod-pick-status{display:flex; justify-content:center; gap:18px; margin-top:8px;}
  .mod-status-pill{
    display:flex; align-items:center; gap:8px;
    padding:8px 14px; border-radius:99px;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--line);
    font-family:var(--mono); font-size:12px; color:var(--ink-dim);
  }
  .mod-status-pill .dot{width:8px; height:8px; border-radius:50%; background:var(--ink-faint); animation: livepulse 1.2s ease-in-out infinite;}
  .mod-status-pill.done{color:var(--green); border-color:var(--green);}
  .mod-status-pill.done .dot{background:var(--green); animation:none;}

  /* ============= Match End ============= */
  .match-end{align-items:center; justify-content:center; padding:48px 24px;}
  .match-end-wrap{
    position:relative; z-index:1;
    width:100%; max-width:1100px;
    display:flex; flex-direction:column; gap:24px;
  }
  .match-end-banner{
    text-align:center; padding:32px;
    background:linear-gradient(180deg, rgba(29,36,71,0.7), rgba(13,17,36,0.7));
    border:1px solid var(--line-strong);
    border-radius:20px;
  }
  .match-end.win .match-end-banner{border-top:4px solid var(--green); box-shadow: 0 24px 48px -16px rgba(61,220,151,0.3);}
  .match-end.lose .match-end-banner{border-top:4px solid var(--red); box-shadow: 0 24px 48px -16px var(--p1-glow);}
  .match-end-result{
    font-family:var(--display); font-size:88px; letter-spacing:0.1em;
    background:linear-gradient(180deg, #fff, #888);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .match-end.win .match-end-result{background:linear-gradient(180deg, var(--green), #1a8459); -webkit-background-clip:text; background-clip:text;}
  .match-end.lose .match-end-result{background:linear-gradient(180deg, var(--red), #8a1f2c); -webkit-background-clip:text; background-clip:text;}
  .match-end-sub{font-family:var(--mono); font-size:14px; color:var(--ink-dim); margin-top:8px; letter-spacing:0.08em;}

  .match-end-grid{display:grid; grid-template-columns: 360px 1fr; gap:20px;}
  .match-end-rank, .match-end-stats{
    padding:24px;
    background:rgba(13,17,36,0.6); border:1px solid var(--line);
    border-radius:18px;
  }
  .me-card-title{font-family:var(--mono); font-size:11px; letter-spacing:0.2em; color:var(--ink-faint); margin-bottom:14px;}
  .me-rank-row{display:flex; align-items:baseline; gap:14px;}
  .me-rank-old{font-family:var(--display); font-size:38px; color:var(--ink-dim);}
  .me-rank-arrow{font-size:24px; color:var(--ink-faint);}
  .me-rank-new{font-family:var(--display); font-size:48px; color:var(--ink);}
  .me-rank-delta{font-family:var(--display); font-size:22px; letter-spacing:0.06em; margin-top:8px;}
  .me-rank-delta.pos{color:var(--green);}
  .me-rank-delta.neg{color:var(--red);}
  .me-stats-row{display:grid; grid-template-columns: repeat(4, 1fr); gap:12px;}
  .ms-n{font-family:var(--display); font-size:36px;}
  .ms-n.pos{color:var(--green);} .ms-n.neg{color:var(--red);}
  .ms-l{font-family:var(--mono); font-size:11px; letter-spacing:0.1em; color:var(--ink-faint); margin-top:4px;}
  .match-end-actions{display:flex; justify-content:center;}
  .match-end-actions .btn-primary{max-width:360px;}

  /* responsive */
  @media (max-width: 1100px){
    .battle-stage{ grid-template-columns: 200px 1fr 200px;}
    .deck-shadow{ width:280px; height:340px;}
    .card-char{font-size:160px;}
    .match-end-grid{grid-template-columns: 1fr;}
    .rs-options{grid-template-columns:repeat(2,1fr);}
    .rs-tiebreak-row{grid-template-columns:1fr; gap:18px;}
  }
  @media (max-width: 880px){
    .battle{padding:12px;}
    .battle-stage{grid-template-columns: 1fr; grid-template-rows: auto auto auto;}
    .battle-log{order:3;}
    .powerup-rail{order:2;}
    .card-stack{order:1;}
    .opp-hud, .me-hud{grid-template-columns: 1fr; gap:12px; text-align:left;}
    .opp-status{justify-content:flex-start;}
    .splash-card{grid-template-columns: 1fr;}
    .splash-profile{justify-content:center; text-align:center;}
    .vs-stage{grid-template-columns:1fr; gap:24px;}
    .practice-row{grid-template-columns:1fr;}
    .mod-options{grid-template-columns:1fr;}
    .rs-options{grid-template-columns:1fr;}
    .brand-title{font-size:36px;}
    .vs-vs{font-size:56px;}
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <script src="data.js"></script>
  <script src="textbook-data.js"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="friend.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
